name: Publish to S3 PyPI

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "485262375119"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/gh-oidc-role
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload distribution to S3
        run: |
          aws s3 sync dist/ s3://wfp-hip-pypi/pypi/data-bridges-knots/ \
            --exclude "*" --include "*.whl" --include "*.tar.gz"

      - name: Regenerate index.html
        run: |
          aws s3 ls s3://wfp-hip-pypi/pypi/data-bridges-knots/ \
            | awk -f scripts/render-simple-index.awk > index.html
          aws s3 cp index.html s3://wfp-hip-pypi/pypi/data-bridges-knots/index.html \
            --content-type "text/html"